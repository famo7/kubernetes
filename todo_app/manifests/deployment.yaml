apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: image-volume
          persistentVolumeClaim:
            claimName: image-claim
      containers:
        - name: todo-app
          image: famo1901/todo-app:2.6
          volumeMounts:
            - name: image-volume
              mountPath: /usr/src/app/files
          env:
            - name: PORT
              value: "3000"
            - name: BACKEND_URL
              value: "http://todo-backend-svc:2345"
