apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      containers:
        - name: log-output
          image: famo1901/log-output:1.10
          imagePullPolicy: Always
          env:
            - name: LOG_FILE
              value: /usr/src/app/files/output.log
          volumeMounts:
            - name: shared-logs
              mountPath: /usr/src/app/files
        - name: log-reader
          image: famo1901/log-reader:1.10
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3001"
            - name: LOG_FILE
              value: /usr/src/app/files/output.log
          volumeMounts:
            - name: shared-logs
              mountPath: /usr/src/app/files
      volumes:
        - name: shared-logs
          emptyDir: {}
