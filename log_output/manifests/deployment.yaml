apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-dep
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logs
  template:
    metadata:
      labels:
        app: logs
    spec:
      volumes:
        - name: shared-log
          emptyDir: {}
        - name: shared-counter
          persistentVolumeClaim:
            claimName: log-claim
        - name: config-volume
          configMap:
            name: log-output-config
      containers:
        - name: log-generator
          image: famo1901/log-generator:1.10
          volumeMounts:
            - name: shared-log
              mountPath: /usr/src/app/files
        - name: log-reader
          image: famo1901/log-reader:2.5
          env:
            - name: MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: log-output-config
                  key: MESSAGE
          volumeMounts:
            - name: shared-log
              mountPath: /usr/src/app/files
            - name: shared-counter
              mountPath: /app/files
            - name: config-volume
              mountPath: /etc/config
