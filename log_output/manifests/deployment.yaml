apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared-logs
          emptyDir: {}
        - name: config-volume
          configMap:
            name: log-output-config
      containers:
        - name: log-output
          image: famo1901/log-output:2.5
          imagePullPolicy: Always
          env:
            - name: LOG_FILE
              value: /usr/src/app/output-files/output.log
            - name: PINGPONG_URL
              value: http://ping-pong-svc:80/pingpong/count
            - name: INFO_FILE_PATH
              value: /usr/src/app/config/information.txt
            - name: MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: log-output-config
                  key: MESSAGE
          volumeMounts:
            - name: shared-logs
              mountPath: /usr/src/app/output-files
            - name: config-volume
              mountPath: /usr/src/app/config
        - name: log-reader
          image: famo1901/log-reader:1.10
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3001"
            - name: LOG_FILE
              value: /usr/src/app/output-files/output.log
          volumeMounts:
            - name: shared-logs
              mountPath: /usr/src/app/output-files
