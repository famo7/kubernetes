apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logs
  template:
    metadata:
      labels:
        app: logs
    spec:
      volumes:
        - name: shared-log
          emptyDir: {}
        - name: shared-counter
          persistentVolumeClaim:
            claimName: log-claim
      containers:
        - name: log-generator
          image: famo1901/log-generator:1.10
          volumeMounts:
            - name: shared-log
              mountPath: /usr/src/app/files
        - name: log-reader
          image: famo1901/log-reader:1.11
          volumeMounts:
            - name: shared-log
              mountPath: /usr/src/app/files
            - name: shared-counter
              mountPath: /app/files
