apiVersion: batch/v1
kind: CronJob
metadata:
  name: todo-wikipedia-generator
  namespace: project
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: generator
              image: famo1901/todo-cronjob:1.0
          restartPolicy: OnFailure
