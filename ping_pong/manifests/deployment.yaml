apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      volumes:
        - name: shared-counter
          persistentVolumeClaim:
            claimName: log-claim
      containers:
        - name: ping-pong
          image: famo1901/pingpong:2.1.2
          volumeMounts:
            - name: shared-counter
              mountPath: /app/files
