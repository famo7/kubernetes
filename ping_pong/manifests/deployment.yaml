apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      volumes:
        - name: shared-files
          persistentVolumeClaim:
            claimName: shared-pvc
      containers:
        - name: ping-pong
          image: famo1901/ping-pong:1.11
          imagePullPolicy: Always
          env:
            - name: FILE_PATH
              value: /usr/src/app/files/pingpong.log
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: shared-files
              mountPath: /usr/src/app/files
